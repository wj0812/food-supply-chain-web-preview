<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鲜链到家客户预览</title>
  <style>
    :root {
      --bg: #eef4f3;
      --phone: #f6f8fa;
      --surface: #ffffff;
      --line: #d9e2e8;
      --text: #172026;
      --muted: #667085;
      --teal: #0f766e;
      --teal-soft: #dff8f4;
      --red: #dc2626;
      --red-soft: #fee4e2;
      --amber: #b45309;
      --amber-soft: #fef3c7;
      --blue: #0369a1;
      --blue-soft: #e0f2fe;
      --green: #047857;
      --green-soft: #d1fae5;
      --shadow: 0 22px 60px rgba(15, 23, 42, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(15, 118, 110, 0.12), rgba(3, 105, 161, 0.08)),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .page {
      display: grid;
      grid-template-columns: minmax(320px, 390px) minmax(320px, 1fr);
      gap: 34px;
      width: min(1180px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px;
      align-items: center;
    }

    .phone {
      position: relative;
      height: min(860px, calc(100vh - 56px));
      min-height: 720px;
      overflow: hidden;
      border: 10px solid #111827;
      border-radius: 34px;
      background: var(--phone);
      box-shadow: var(--shadow);
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      width: 118px;
      height: 24px;
      transform: translateX(-50%);
      border-radius: 0 0 16px 16px;
      background: #111827;
      z-index: 5;
    }

    .screen {
      height: 100%;
      overflow: auto;
      padding: 26px 14px 88px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 4px 14px;
    }

    .store {
      font-weight: 850;
      font-size: 20px;
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 8px;
      color: var(--teal);
      background: var(--teal-soft);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.red {
      color: #b42318;
      background: var(--red-soft);
    }

    .pill.amber {
      color: var(--amber);
      background: var(--amber-soft);
    }

    .pill.blue {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 42px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--muted);
      font-size: 13px;
    }

    .hero {
      margin-top: 14px;
      min-height: 172px;
      overflow: hidden;
      border-radius: 8px;
      background:
        linear-gradient(110deg, rgba(15, 118, 110, 0.9), rgba(15, 118, 110, 0.16)),
        url("https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=900&q=80") center/cover;
      color: #ffffff;
      padding: 22px;
    }

    .hero h1 {
      width: 72%;
      margin: 8px 0;
      font-size: 28px;
      line-height: 1.14;
    }

    .hero .sub {
      width: 78%;
      color: #dcfce7;
      font-size: 13px;
      line-height: 1.45;
    }

    .section {
      margin-top: 18px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .cat {
      min-height: 76px;
      padding: 10px 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      text-align: center;
      color: var(--text);
    }

    .cat-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--teal-soft);
      color: var(--teal);
      font-weight: 850;
    }

    .cat-name {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .promo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .promo {
      min-height: 96px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      border-left: 5px solid var(--teal);
    }

    .promo.amber {
      border-left-color: #d97706;
    }

    .promo-title {
      font-weight: 850;
    }

    .product-list {
      display: grid;
      gap: 12px;
    }

    .product {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .product-img {
      width: 92px;
      height: 92px;
      border-radius: 8px;
      background: var(--img) center/cover;
    }

    .product-title {
      font-weight: 850;
      line-height: 1.35;
    }

    .product-info {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .buy-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      margin-top: 9px;
    }

    .price {
      color: var(--red);
      font-size: 19px;
      font-weight: 900;
    }

    .old-price {
      margin-left: 4px;
      color: #98a2b3;
      font-size: 11px;
      text-decoration: line-through;
    }

    .add {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 50%;
      background: var(--teal);
      color: #ffffff;
      font-size: 22px;
      font-weight: 850;
    }

    .tabs {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      height: 72px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      z-index: 4;
    }

    .tab {
      display: grid;
      place-items: center;
      gap: 3px;
      background: transparent;
      color: #667085;
      font-size: 12px;
    }

    .tab.active {
      color: var(--teal);
      font-weight: 850;
    }

    .tab-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }

    .filter {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: #475467;
      font-size: 13px;
    }

    .filter.active {
      border-color: var(--teal);
      background: var(--teal);
      color: #ffffff;
      font-weight: 800;
    }

    .cart-store,
    .order-card,
    .summary,
    .member-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .cart-line {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr);
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .cart-line:last-child {
      border-bottom: 0;
    }

    .cart-img {
      width: 74px;
      height: 74px;
      border-radius: 8px;
      background: var(--img) center/cover;
    }

    .split {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .fee {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .paybar {
      position: sticky;
      bottom: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 16px -4px 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .primary {
      min-height: 40px;
      padding: 0 18px;
      border-radius: 8px;
      background: var(--teal);
      color: #ffffff;
      font-weight: 850;
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf2f7;
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--teal);
    }

    .exception {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      background: var(--red-soft);
      color: #b42318;
      font-size: 12px;
      line-height: 1.45;
    }

    .copy {
      align-self: center;
      max-width: 560px;
    }

    .copy .eyebrow {
      color: var(--teal);
      font-size: 14px;
      font-weight: 900;
    }

    .copy h1 {
      margin: 10px 0 14px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.05;
    }

    .copy p {
      margin: 0;
      color: #475467;
      font-size: 17px;
      line-height: 1.75;
    }

    .copy-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .desktop-button {
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: var(--teal);
      color: #ffffff;
      font-weight: 850;
    }

    .desktop-button.secondary {
      border-color: var(--line);
      background: #ffffff;
      color: #344054;
    }

    .proof {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 30px;
    }

    .proof-card {
      min-height: 104px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .proof-value {
      color: var(--teal);
      font-size: 24px;
      font-weight: 900;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(15, 23, 42, 0.42);
      z-index: 20;
    }

    .modal.open {
      display: flex;
    }

    .dialog {
      width: min(760px, 100%);
      max-height: 88vh;
      overflow: auto;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .dialog-head {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .dialog-body {
      padding: 18px;
    }

    .close {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--muted);
      font-size: 20px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-box {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .timeline-row:last-child {
      border-bottom: 0;
    }

    .timeline-dot {
      width: 12px;
      height: 12px;
      margin-top: 4px;
      border: 3px solid #cbd5e1;
      border-radius: 50%;
      background: #ffffff;
    }

    .timeline-dot.done {
      border-color: #99f6e4;
      background: var(--teal);
    }

    @media (max-width: 920px) {
      .page {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .phone {
        width: min(390px, 100%);
        margin: 0 auto;
      }

      .copy {
        order: -1;
        max-width: none;
      }

      .proof {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

        <section class="view" id="profile"></section>

      <nav class="tabs" aria-label="底部导航">

        <button class="tab" data-view="cart"><span class="tab-dot"></span><span>购物车</span></button>
        <button class="tab" data-view="orders"><span class="tab-dot"></span><span>订单</span></button>
        <button class="tab" data-view="profile"><span class="tab-dot"></span><span>我的</span></button>
      </nav>
    </div>

    <aside class="copy">

        <div class="proof-card"><div class="proof-value">全链路</div><div class="muted small">批次质检冷链</div></div>
      </div>
    </aside>
  </div>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="dialog">
      <div class="dialog-head">
        <div>
          <div class="muted small">订单详情</div>
          <h2 id="modalTitle"></h2>
          <div id="modalSub" class="muted small"></div>
        </div>
        <button class="close" id="closeModal" aria-label="关闭">×</button>
      </div>
      <div class="dialog-body" id="modalBody"></div>
    </div>
  </div>

      { id: "o2026052901", no: "HM-0529-001", title: "今日晚餐生鲜到家", user: "上海青浦·家庭账户", supplierId: "s1", status: "delivery", eta: "今日 18:30", route: "青浦盒鲜仓 -> 中山公园配送站", amount: 86.4, progress: 72, exception: "", items: [{ name: "有机娃娃菜", qty: "2份", checked: "已抽检" }, { name: "精品番茄", qty: "1盒", checked: "已抽检" }, { name: "东海黄鱼", qty: "1条", checked: "已抽检" }], batch: { no: "BT20260529-A01", origin: "山东寿光", harvestAt: "05-29 04:30", temp: "2-8°C" }, qa: { result: "合格", reportNo: "QA-20260529-811", inspector: "王敏" }, timeline: [{ time: "17:05", title: "用户下单", desc: "晚餐生鲜订单已支付", done: true }, { time: "17:12", title: "门店拣货", desc: "青浦盒鲜仓锁定库存", done: true }, { time: "17:28", title: "质检复核", desc: "农残快检与冷链记录通过", done: true }, { time: "17:45", title: "骑手取货", desc: "预计18:30前送达", done: true }, { time: "18:30", title: "用户签收", desc: "等待收货确认", done: false }] },
      { id: "o2026052902", no: "HM-0529-002", title: "海鲜冷链复核订单", user: "上海浦东·家庭账户", supplierId: "s2", status: "exception", eta: "今日 20:30", route: "舟山冷库 -> 浦东前置仓", amount: 129.7, progress: 48, exception: "冷链温度短时高于-12°C，已触发批次复核", items: [{ name: "东海黄鱼", qty: "2条", checked: "复检中" }, { name: "赣南脐橙", qty: "1袋", checked: "已抽检" }], batch: { no: "BT20260529-C08", origin: "浙江舟山", harvestAt: "05-28 22:00", temp: "-18°C" }, qa: { result: "复检中", reportNo: "QA-20260529-917", inspector: "刘倩" }, timeline: [{ time: "15:20", title: "用户下单", desc: "海鲜订单已支付", done: true }, { time: "15:36", title: "门店拣货", desc: "海湾冷链水产批次已出库", done: true }, { time: "15:50", title: "温控预警", desc: "短时温度异常，已通知仓配", done: true }, { time: "16:05", title: "批次复核", desc: "等待质检复核结论", done: false }] },
      { id: "o2026052903", no: "HM-0529-003", title: "周末家庭肉禽备餐", user: "上海静安·家庭账户", supplierId: "s3", status: "pending", eta: "明日 10:00-10:30", route: "南阳加工仓 -> 静安前置仓", amount: 57.8, progress: 18, exception: "", items: [{ name: "鲜切鸡腿肉", qty: "2盒", checked: "待检" }, { name: "有机娃娃菜", qty: "1份", checked: "待检" }], batch: { no: "待生成", origin: "河南南阳", harvestAt: "待排产", temp: "0-4°C" }, qa: { result: "待检", reportNo: "待生成", inspector: "待分配" }, timeline: [{ time: "11:25", title: "用户预约", desc: "选择明日上午送达时段", done: true }, { time: "待定", title: "门店接单", desc: "等待前置仓确认库存", done: false }] }
    ];

    const categories = [
      ["蔬菜豆菇", "蔬"], ["水果鲜花", "果"], ["肉禽蛋品", "肉"], ["海鲜水产", "鲜"],
      ["日日鲜", "日"], ["预制菜", "餐"], ["乳品烘焙", "乳"], ["粮油调味", "粮"]
    ];

    const statusMap = {
      delivery: ["送货中", ""],
      exception: ["复核中", "red"],
      pending: ["待接单", "amber"],
      completed: ["已完成", "blue"]
    };

    const money = (value) => `¥${Number(value).toLocaleString("zh-CN", { maximumFractionDigits: 2 })}`;
    const sup = (id) => suppliers.find((item) => item.id === id) || {};
    const pill = (text, tone = "") => `<span class="pill ${tone}">${text}</span>`;
    const status = (order) => statusMap[order.status] || ["待处理", "blue"];

    function productCard(product) {
      return `
        <article class="product">
          <div class="product-img" style="--img:url('${product.image}')"></div>
          <div>
            <div class="split">
              <div class="product-title">${product.name}</div>
              ${pill(product.category, "blue")}
            </div>
            <div class="product-info">${product.origin} · ${product.freshness} · ${product.cold}</div>
            <div class="product-info">${product.certs.join(" / ")}</div>
            <div class="buy-row">
              <div><span class="price">${money(product.member)}</span><span class="old-price">${money(product.price)}</span><div class="small muted">${product.spec}</div></div>
              <button class="add" data-view-link="cart">+</button>
            </div>
          </div>
        </article>
      `;
    }

    function orderCard(order) {
      const [label, tone] = status(order);
      return `
        <button class="order-card" data-open-order="${order.id}">
          <div class="split">
            <div><div class="product-title">${order.title}</div><div class="small muted">${order.no} · ${order.user}</div></div>
            ${pill(label, tone)}
          </div>
          <div class="product-info">${order.route}</div>
          <div style="margin:12px 0 9px" class="progress"><span style="width:${order.progress}%"></span></div>
          <div class="split small"><span class="muted">${order.eta}</span><strong>${money(order.amount)}</strong></div>
          ${order.exception ? `<div class="exception">${order.exception}</div>` : ""}
        </button>
      `;
    }

    function renderDashboard() {
      document.getElementById("dashboard").innerHTML = `
        <div class="top">
          <div><div class="small muted">当前门店</div><div class="store">上海青浦店</div><div class="small muted">配送至 中山公园商圈</div></div>
          ${pill("最快30分钟达")}
        </div>
        <button class="search" data-view-link="catalog">搜 娃娃菜、黄鱼、鸡腿肉、脐橙</button>
        <div class="hero"><div class="pill">晚餐鲜食会</div><h1>新鲜到家，放心到餐桌</h1><div class="sub">参考盒马式生鲜购买体验，叠加批次、质检、冷链履约信息。</div></div>
        <div class="section"><div class="category-grid">${categories.map(([name, icon]) => `<button class="cat" data-view-link="catalog"><span class="cat-icon">${icon}</span><div class="cat-name">${name}</div></button>`).join("")}</div></div>
        <div class="section promo-grid">
          <div class="promo"><div class="promo-title">晚餐组合</div><div class="small muted" style="margin-top:8px">水产肉禽满99减20</div></div>
          <div class="promo amber"><div class="promo-title">今日日日鲜</div><div class="small muted" style="margin-top:8px">蔬菜采后24小时到店</div></div>
        </div>
        <div class="section"><div class="section-head"><h2>今日推荐</h2><button class="filter" data-view-link="catalog">更多</button></div><div class="product-list">${products.slice(0, 4).map(productCard).join("")}</div></div>
        <div class="section"><div class="section-head"><h2>正在配送</h2>${pill("送货中")}</div>${orderCard(orders[0])}</div>
      `;
    }

    function renderCatalog(active = "全部") {
      const filters = ["全部", "蔬菜", "肉禽", "水产", "水果"];
      const list = products.filter((item) => active === "全部" || item.category === active);
      document.getElementById("catalog").innerHTML = `
        <div class="top"><div><div class="store">商品分类</div><div class="small muted">盒马式分类浏览与快速加购</div></div>${pill("可追溯")}</div>
        <button class="search">搜索生鲜、海鲜、水果、日日鲜</button>
        <div class="section filter-row">${filters.map((item) => `<button class="filter ${item === active ? "active" : ""}" data-category="${item}">${item}</button>`).join("")}</div>
        <div class="product-list">${list.map(productCard).join("")}</div>
      `;
    }

    function renderCart() {
      const lines = [
        { product: products[0], qty: 2 },
        { product: products[1], qty: 1 },
        { product: products[3], qty: 1 }
      ];
      const subtotal = lines.reduce((sum, line) => sum + line.product.member * line.qty, 0);
      const payable = subtotal - 12;
      document.getElementById("cart").innerHTML = `
        <div class="top"><div><div class="store">购物车</div><div class="small muted">上海青浦店 · 今日18:30-19:00送达</div></div>${pill("免配送费")}</div>
        <div class="section cart-store">
          ${lines.map(({ product, qty }) => `
            <div class="cart-line">
              <div class="cart-img" style="--img:url('${product.image}')"></div>
              <div>
                <div class="split"><div class="product-title">${product.name}</div><strong>${money(product.member * qty)}</strong></div>
                <div class="small muted">${product.spec} · ${product.cold}</div>
                <div class="split" style="margin-top:10px">${pill(product.certs[0])}<strong>× ${qty}</strong></div>
              </div>
            </div>
          `).join("")}
        </div>
        <div class="section summary">
          <div class="fee"><span>商品小计</span><strong>${money(subtotal)}</strong></div>
          <div class="fee"><span>配送费</span><strong>免配送费</strong></div>
          <div class="fee"><span>优惠券</span><strong style="color:var(--red)">-${money(12)}</strong></div>
        </div>
        <div class="paybar"><div><div class="small muted">应付</div><div class="price">${money(payable)}</div></div><button class="primary">去结算</button></div>
      `;
    }

    function renderOrders() {
      document.getElementById("orders").innerHTML = `
        <div class="top"><div><div class="store">我的订单</div><div class="small muted">送达、质检、冷链、售后复核</div></div>${pill("4单")}</div>
        <div class="product-list">${orders.map(orderCard).join("")}</div>
      `;
    }

    function renderProfile() {
      document.getElementById("profile").innerHTML = `
        <div class="top"><div><div class="store">鲜链会员</div><div class="small muted">V2 · 积分 2680</div></div>${pill("会员价")}</div>
        <div class="section member-card">
          <div class="split"><div><div class="product-title">地址管理</div><div class="small muted">常用配送地址和门店</div></div>${pill("预览", "blue")}</div>
        </div>
        <div class="section member-card">
          <div class="split"><div><div class="product-title">优惠券</div><div class="small muted">满减券、会员券和运费券</div></div>${pill("3张", "red")}</div>
        </div>
        <div class="section member-card">
          <div class="split"><div><div class="product-title">售后客服</div><div class="small muted">异常订单和退款进度</div></div>${pill("在线")}</div>
        </div>
      `;
    }

    function openOrder(id) {
      const order = orders.find((item) => item.id === id);
      if (!order) return;
      const [label, tone] = status(order);
      document.getElementById("modalTitle").textContent = order.title;
      document.getElementById("modalSub").textContent = `${order.no} · ${order.user}`;
      document.getElementById("modalBody").innerHTML = `
        <div class="detail-grid">
          <div class="detail-box"><div class="small muted">状态</div><strong>${label}</strong></div>
          <div class="detail-box"><div class="small muted">金额</div><strong>${money(order.amount)}</strong></div>
          <div class="detail-box"><div class="small muted">产地/仓</div><strong>${sup(order.supplierId).city}</strong></div>
          <div class="detail-box"><div class="small muted">温控</div><strong>${order.batch.temp}</strong></div>
        </div>
        ${order.exception ? `<div class="exception">${order.exception}</div>` : ""}
        <div class="section"><div class="section-head"><h2>商品明细</h2>${pill(label, tone)}</div><div class="cart-store">${order.items.map((item) => `<div class="fee"><span>${item.name} · ${item.checked}</span><strong>${item.qty}</strong></div>`).join("")}</div></div>
        <div class="section detail-grid">
          <div class="detail-box"><h2>批次信息</h2><div class="fee"><span>批次号</span><strong>${order.batch.no}</strong></div><div class="fee"><span>产地</span><strong>${order.batch.origin}</strong></div><div class="fee"><span>采收</span><strong>${order.batch.harvestAt}</strong></div></div>
          <div class="detail-box"><h2>质检结果</h2><div class="fee"><span>结论</span><strong>${order.qa.result}</strong></div><div class="fee"><span>报告号</span><strong>${order.qa.reportNo}</strong></div><div class="fee"><span>质检员</span><strong>${order.qa.inspector}</strong></div></div>
        </div>
        <div class="section cart-store"><h2>履约时间线</h2>${order.timeline.map((item) => `<div class="timeline-row"><span class="timeline-dot ${item.done ? "done" : ""}"></span><div><div class="split"><strong>${item.title}</strong><span class="small muted">${item.time}</span></div><div class="small muted">${item.desc}</div></div></div>`).join("")}</div>
      `;
      document.getElementById("modal").classList.add("open");
    }

    function setView(view) {
      document.querySelectorAll(".view").forEach((node) => node.classList.toggle("active", node.id === view));
      document.querySelectorAll(".tab").forEach((node) => node.classList.toggle("active", node.dataset.view === view));
    }

    document.addEventListener("click", (event) => {
      const view = event.target.closest("[data-view]");
      const link = event.target.closest("[data-view-link]");
      const category = event.target.closest("[data-category]");
      const order = event.target.closest("[data-open-order]");
      if (view) setView(view.dataset.view);
      if (link) setView(link.dataset.viewLink);
      if (category) renderCatalog(category.dataset.category);
      if (order) openOrder(order.dataset.openOrder);
      if (event.target.id === "modal") document.getElementById("modal").classList.remove("open");
    });

    document.getElementById("closeModal").addEventListener("click", () => document.getElementById("modal").classList.remove("open"));
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") document.getElementById("modal").classList.remove("open");
    });

    renderDashboard();
    renderCatalog();
    renderCart();
    renderOrders();
    renderProfile();
  </script>
</body>
</html>
