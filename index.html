<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鲜链履约客户预览</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f8;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --line: #d9e2e8;
      --text: #182230;
      --muted: #667085;
      --teal: #0f766e;
      --teal-soft: #dff8f4;
      --blue: #0369a1;
      --blue-soft: #e0f2fe;
      --amber: #b45309;
      --amber-soft: #fef3c7;
      --red: #b42318;
      --red-soft: #fee4e2;
      --green: #047857;
      --green-soft: #d1fae5;
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      border-right: 1px solid var(--line);
      background: #ffffff;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 8px 22px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 8px;
      background: #0f766e;
      color: #ffffff;
      font-weight: 800;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 800;
    }

    .brand-subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav {
      display: grid;
      gap: 8px;
      margin-top: 22px;
    }

    .nav-button {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: #344054;
      text-align: left;
    }

    .nav-button.active {
      border-color: #99f6e4;
      background: var(--teal-soft);
      color: #0f766e;
      font-weight: 700;
    }

    .nav-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: currentColor;
    }

    .sidebar-panel {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .role-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 12px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .role-button {
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
    }

    .role-button.active {
      background: #0f766e;
      color: #ffffff;
      font-weight: 700;
    }

    .main {
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .eyebrow {
      color: var(--teal);
      font-size: 13px;
      font-weight: 800;
    }

    h1 {
      margin: 5px 0 6px;
      font-size: 28px;
      line-height: 1.2;
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .button {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #0f766e;
      color: #ffffff;
      font-weight: 700;
    }

    .button.secondary {
      border-color: var(--line);
      background: #ffffff;
      color: #344054;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .two-col {
      grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
      align-items: start;
    }

    .catalog-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
    }

    .metric-card {
      min-height: 142px;
      padding: 18px;
      border-left: 5px solid var(--teal);
    }

    .metric-card.blue {
      border-left-color: var(--blue);
    }

    .metric-card.amber {
      border-left-color: #d97706;
    }

    .metric-card.red {
      border-left-color: #dc2626;
    }

    .metric-title {
      color: var(--muted);
      font-size: 13px;
    }

    .metric-value {
      margin-top: 10px;
      font-size: 28px;
      font-weight: 850;
      line-height: 1.15;
    }

    .metric-caption {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .section {
      margin-top: 22px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status.success {
      background: var(--green-soft);
      color: var(--green);
    }

    .status.info {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .status.warning {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .status.danger {
      background: var(--red-soft);
      color: var(--red);
    }

    .status.neutral {
      background: #eef2f6;
      color: #475467;
    }

    .order-list {
      display: grid;
      gap: 12px;
    }

    .order-card {
      padding: 18px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.04);
    }

    .order-card:hover {
      border-color: #99f6e4;
    }

    .split {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .title {
      color: var(--text);
      font-weight: 800;
      line-height: 1.35;
    }

    .progress {
      height: 9px;
      margin: 16px 0 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf2f7;
    }

    .progress > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: #0f766e;
    }

    .exception {
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid #fecdca;
      border-radius: 8px;
      background: #fff1f0;
      color: var(--red);
      font-size: 13px;
      line-height: 1.45;
    }

    .panel {
      padding: 18px;
    }

    .summary-row,
    .task-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .summary-row:last-child,
    .task-row:last-child {
      border-bottom: 0;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 850;
    }

    .visual-strip {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 12px;
      min-height: 220px;
      margin-bottom: 20px;
    }

    .photo-card {
      position: relative;
      overflow: hidden;
      min-height: 220px;
      border-radius: 8px;
      background:
        linear-gradient(110deg, rgba(15, 118, 110, 0.88), rgba(24, 34, 48, 0.35)),
        url("https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1200&q=80") center/cover;
    }

    .photo-card .photo-copy {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      color: #ffffff;
    }

    .photo-copy strong {
      display: block;
      margin-bottom: 8px;
      font-size: 24px;
      line-height: 1.2;
    }

    .insight-card {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .insight-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .insight-item {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .insight-dot {
      width: 12px;
      height: 12px;
      margin-top: 4px;
      border-radius: 50%;
      background: #0f766e;
    }

    .product-card {
      overflow: hidden;
    }

    .product-image {
      height: 132px;
      background: var(--image) center/cover;
    }

    .product-body {
      padding: 16px;
    }

    .product-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .label {
      color: var(--muted);
      font-size: 12px;
    }

    .value {
      margin-top: 4px;
      font-weight: 800;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: #475467;
      font-size: 13px;
    }

    .filter.active {
      border-color: #0f766e;
      background: #0f766e;
      color: #ffffff;
      font-weight: 800;
    }

    .supplier-head {
      padding: 20px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .supplier-body {
      padding: 18px;
    }

    .timeline {
      display: grid;
      gap: 0;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .timeline-row:last-child {
      border-bottom: 0;
    }

    .timeline-dot {
      width: 14px;
      height: 14px;
      margin-top: 3px;
      border: 3px solid #cbd5e1;
      border-radius: 50%;
      background: #ffffff;
    }

    .timeline-dot.done {
      border-color: #99f6e4;
      background: #0f766e;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.42);
      z-index: 20;
    }

    .modal.open {
      display: flex;
    }

    .dialog {
      width: min(880px, 100%);
      max-height: min(760px, 92vh);
      overflow: auto;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .dialog-head {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      z-index: 1;
    }

    .dialog-body {
      padding: 20px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .detail-box {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .close {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    @media (max-width: 980px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .nav {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .sidebar-panel {
        margin-top: 16px;
      }

      .main {
        padding: 20px;
      }

      .metrics,
      .catalog-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .two-col,
      .visual-strip {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body {
        font-size: 14px;
      }

      .sidebar {
        padding: 16px;
      }

      .nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar {
        display: block;
      }

      .toolbar {
        justify-content: flex-start;
        margin-top: 14px;
      }

      .metrics,
      .catalog-grid,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .photo-card {
        min-height: 190px;
      }

      .product-meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">

    <main class="main">

      <section id="catalog" class="view"></section>
      <section id="orders" class="view"></section>
      <section id="supplier" class="view"></section>
    </main>
  </div>

        <button class="close" id="closeModal" aria-label="关闭">×</button>

      <div id="modalBody" class="dialog-body"></div>

  </div>

        exception: "车厢温度短时高于-12°C，需复核批次",
        items: [{ name: "东海黄鱼", qty: "72箱", checked: "复检中" }],
        batch: { no: "BT20260529-C08", origin: "浙江舟山", harvestAt: "05-28 22:00", shelfLife: "180天", tempRange: "-18°C" },
        qa: { result: "复检中", pesticide: "不适用", reportNo: "QA-20260529-917", inspector: "刘倩", checkedAt: "05-29 16:05" },
        timeline: [
          { time: "08:40", title: "采购方发布需求", desc: "水产周转库存低于安全线", done: true },
          { time: "09:35", title: "供应商确认供货", desc: "海湾冷链水产已接单", done: true },
          { time: "14:20", title: "冷链发车", desc: "车辆浙B7Q61已出库", done: true },
          { time: "15:50", title: "温控预警", desc: "车厢温度短时异常，已通知承运商", done: true },
          { time: "16:05", title: "批次复核", desc: "等待质检复核结论", done: false }
        ]
      },
      {
        id: "o2026052903",
        demandNo: "PR-0529-003",
        title: "高校食堂肉禽采购",
        buyer: "西城高校食堂",
        supplierId: "s3",
        status: "pending_quote",
        priority: "normal",
        eta: "明日 10:00",
        route: "南阳加工仓 -> 南京江宁仓",
        amount: 21400,
        progress: 18,
        exception: "",
        items: [{ name: "鲜切鸡腿肉", qty: "80箱", checked: "待检" }],
        batch: { no: "待生成", origin: "河南南阳", harvestAt: "待排产", shelfLife: "7天", tempRange: "0-4°C" },
        qa: { result: "待检", pesticide: "不适用", reportNo: "待生成", inspector: "待分配", checkedAt: "待检" },
        timeline: [
          { time: "11:25", title: "采购方发布需求", desc: "等待供应商报价确认", done: true },
          { time: "待定", title: "供应商接单", desc: "等待牧原优选食材响应", done: false },
          { time: "待定", title: "排产质检", desc: "接单后生成批次与质检任务", done: false }
        ]
      },
      {
        id: "o2026052804",
        demandNo: "PR-0528-004",
        title: "社区团购水果补仓",
        buyer: "南区社区团购",
        supplierId: "s1",
        status: "completed",
        priority: "normal",
        eta: "已签收",
        route: "赣州仓 -> 上海浦东仓",
        amount: 18880,
        progress: 100,
        exception: "",
        items: [{ name: "赣南脐橙", qty: "160箱", checked: "已抽检" }],
        batch: { no: "BT20260528-F11", origin: "江西赣州", harvestAt: "05-27 10:00", shelfLife: "20天", tempRange: "常温" },
        qa: { result: "合格", pesticide: "未检出", reportNo: "QA-20260528-509", inspector: "周洁", checkedAt: "05-28 16:40" },
        timeline: [
          { time: "05-28 14:00", title: "采购方发布需求", desc: "社区团购补仓单已确认", done: true },
          { time: "05-28 15:30", title: "供应商确认供货", desc: "库存已锁定", done: true },
          { time: "05-28 18:10", title: "质检放行", desc: "抽检合格", done: true },
          { time: "05-29 09:20", title: "采购方签收", desc: "到仓验收完成", done: true }
        ]
      }
    ];

    const statusMeta = {
      pending_quote: ["待报价", "warning"],
      delivery: ["配送中", "success"],
      exception: ["异常", "danger"],
      completed: ["已完成", "neutral"]
    };

    const supplierTasks = [
      { title: "高校食堂肉禽采购报价", due: "今日 16:00", type: "待报价", tone: "warning" },
      { title: "中央厨房周末备货发车回单", due: "今日 18:30", type: "待回单", tone: "info" },
      { title: "水产温控异常复核", due: "今日 17:30", type: "异常", tone: "danger" }
    ];

    const money = (value) => `¥${Number(value).toLocaleString("zh-CN")}`;
    const supplier = (id) => suppliers.find((item) => item.id === id) || {};
    const status = (order) => statusMeta[order.status] || ["待处理", "neutral"];
    const statusTag = (label, tone = "neutral") => `<span class="status ${tone}">${label}</span>`;
    const orderData = (order) => {
      const [label, tone] = status(order);
      return { ...order, supplierName: supplier(order.supplierId).name, statusLabel: label, statusTone: tone };
    };
    const decoratedOrders = orders.map(orderData);

    function renderDashboard() {
      const total = orders.reduce((sum, order) => sum + order.amount, 0);
      const metrics = [
        ["今日采购额", money(total), "含已完成和履约中订单", ""],
        ["配送中", decoratedOrders.filter((order) => order.status === "delivery").length, "车辆与温控持续跟踪", "blue"],
        ["待确认", decoratedOrders.filter((order) => order.status === "pending_quote").length, "供应商报价待处理", "amber"],
        ["异常", decoratedOrders.filter((order) => order.status === "exception").length, "需质检或承运商复核", "red"]
      ];
      const urgent = decoratedOrders.filter((order) => order.status === "exception" || order.priority !== "normal");

      document.getElementById("dashboard").innerHTML = `
        <div class="visual-strip">
          <div class="photo-card">
            <div class="photo-copy">
              <strong>从采购需求到到仓签收</strong>
              <span>把供应商接单、批次质检、冷链配送和异常复核放在同一个工作台。</span>
            </div>
          </div>
          <div class="insight-card">
            <div class="eyebrow">今日履约重点</div>
            <h2 style="margin-top: 6px;">2 条订单需要运营介入</h2>
            <div class="insight-list">
              <div class="insight-item"><span class="insight-dot"></span><span>水产冷链温控异常，等待质检复核。</span></div>
              <div class="insight-item"><span class="insight-dot" style="background:#d97706;"></span><span>高校食堂肉禽订单待供应商报价。</span></div>
              <div class="insight-item"><span class="insight-dot" style="background:#0369a1;"></span><span>中央厨房备货单预计今日 18:00 到仓。</span></div>
            </div>
          </div>
        </div>
        <div class="grid metrics">
          ${metrics.map(([title, value, caption, tone]) => `
            <div class="card metric-card ${tone}">
              <div class="metric-title">${title}</div>
              <div class="metric-value">${value}</div>
              <div class="metric-caption">${caption}</div>
            </div>
          `).join("")}
        </div>
        <div class="grid two-col section">
          <div>
            <div class="section-head"><h2>履约预警</h2><span class="muted small">${urgent.length} 条需关注</span></div>
            <div class="order-list">${urgent.map(renderOrderCard).join("")}</div>
          </div>
          <div class="card panel">
            <div class="section-head"><h2>采购需求概况</h2></div>
            ${[
              ["待供应商确认", 6, "warning"],
              ["今日配送", 12, "info"],
              ["异常待处理", 2, "danger"]
            ].map(([label, value, tone]) => `
              <div class="summary-row">
                ${statusTag(label, tone)}
                <span class="summary-value">${value}</span>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderCatalog(category = "全部") {
      const categories = ["全部", "蔬菜", "肉禽", "水产", "水果"];
      const list = products.filter((item) => category === "全部" || item.category === category);
      document.getElementById("catalog").innerHTML = `
        <div class="section-head">
          <div><h2>商品目录</h2><div class="muted small">产地、库存、证照和冷链条件集中展示</div></div>
        </div>
        <div class="filters">${categories.map((item) => `<button class="filter ${item === category ? "active" : ""}" data-category="${item}">${item}</button>`).join("")}</div>
        <div class="grid catalog-grid">
          ${list.map((product) => `
            <article class="card product-card">
              <div class="product-image" style="--image:url('${product.image}')"></div>
              <div class="product-body">
                <div class="split">
                  <div><div class="title">${product.name}</div><div class="muted small">${product.origin} · ${supplier(product.supplierId).name}</div></div>
                  ${statusTag(product.category, "neutral")}
                </div>
                <div class="product-meta">
                  <div><div class="label">规格报价</div><div class="value">${money(product.price)}/${product.spec}</div></div>
                  <div><div class="label">库存</div><div class="value">${product.stock}</div></div>
                  <div><div class="label">冷链</div><div class="value">${product.coldChain}</div></div>
                </div>
                <div class="muted small" style="margin-top:14px;">${product.freshness} · ${product.certs.join(" / ")}</div>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderOrders(filter = "全部") {
      const filters = [["全部", "all"], ["待确认", "pending_quote"], ["配送中", "delivery"], ["异常", "exception"]];
      const list = decoratedOrders.filter((order) => filter === "all" || order.status === filter);
      document.getElementById("orders").innerHTML = `
        <div class="section-head">
          <div><h2>采购订单</h2><div class="muted small">按履约状态跟进供应商、批次、质检和配送</div></div>
        </div>
        <div class="filters">${filters.map(([label, key]) => `<button class="filter ${key === filter ? "active" : ""}" data-order-filter="${key}">${label}</button>`).join("")}</div>
        <div class="order-list">${list.map(renderOrderCard).join("")}</div>
      `;
    }

    function renderSupplier() {
      const lead = suppliers[0];
      document.getElementById("supplier").innerHTML = `
        <div class="card">
          <div class="supplier-head">
            <div class="split">
              <div><h2>${lead.name}</h2><div class="muted small">${lead.city} · 等级 ${lead.rating} · ${lead.certificateStatus}</div></div>
              ${statusTag("供应商", "success")}
            </div>
          </div>
          <div class="supplier-body">
            <div class="grid metrics">
              ${[
                ["待处理任务", supplierTasks.length, "报价、回单、异常复核", "amber"],
                ["准时履约率", "98%", "近30天配送表现", ""],
                ["在途订单", decoratedOrders.filter((order) => order.status !== "completed").length, "含待确认和配送中", "blue"],
                ["异常单", decoratedOrders.filter((order) => order.status === "exception").length, "需当天闭环", "red"]
              ].map(([title, value, caption, tone]) => `
                <div class="card metric-card ${tone}">
                  <div class="metric-title">${title}</div>
                  <div class="metric-value">${value}</div>
                  <div class="metric-caption">${caption}</div>
                </div>
              `).join("")}
            </div>
            <div class="grid two-col section">
              <div class="card panel">
                <div class="section-head"><h2>待处理任务</h2></div>
                ${supplierTasks.map((task) => `
                  <div class="task-row"><div><div class="title">${task.title}</div><div class="muted small">截止 ${task.due}</div></div>${statusTag(task.type, task.tone)}</div>
                `).join("")}
              </div>
              <div>
                <div class="section-head"><h2>关联订单</h2></div>
                <div class="order-list">${decoratedOrders.filter((order) => order.status !== "completed").slice(0, 3).map(renderOrderCard).join("")}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderOrderCard(order) {
      return `
        <button class="order-card" data-open-order="${order.id}">
          <div class="split">
            <div><div class="title">${order.title}</div><div class="muted small">${order.demandNo} · ${order.buyer} · ${order.supplierName}</div></div>
            ${statusTag(order.statusLabel, order.statusTone)}
          </div>
          <div class="progress"><span style="width:${order.progress}%"></span></div>
          <div class="split small"><span class="muted">${order.route} · ${order.eta}</span><strong>${money(order.amount)}</strong></div>
          ${order.exception ? `<div class="exception">${order.exception}</div>` : ""}
        </button>
      `;
    }

    function openOrder(id) {
      const order = decoratedOrders.find((item) => item.id === id);
      if (!order) return;
      document.getElementById("modalTitle").textContent = order.title;
      document.getElementById("modalSub").textContent = `${order.demandNo} · ${order.buyer} · ${order.supplierName}`;
      document.getElementById("modalBody").innerHTML = `
        <div class="detail-grid">
          <div class="detail-box"><div class="label">采购金额</div><div class="value">${money(order.amount)}</div></div>
          <div class="detail-box"><div class="label">预计到达</div><div class="value">${order.eta}</div></div>
          <div class="detail-box"><div class="label">批次号</div><div class="value">${order.batch.no}</div></div>
          <div class="detail-box"><div class="label">温控要求</div><div class="value">${order.batch.tempRange}</div></div>
        </div>
        ${order.exception ? `<div class="exception">${order.exception}</div>` : ""}
        <div class="section">
          <div class="section-head"><h2>商品明细</h2>${statusTag(order.statusLabel, order.statusTone)}</div>
          <div class="card panel">
            ${order.items.map((item) => `<div class="summary-row"><div><div class="title">${item.name}</div><div class="muted small">${item.checked}</div></div><strong>${item.qty}</strong></div>`).join("")}
          </div>
        </div>
        <div class="grid two-col section">
          <div class="card panel">
            <h2>批次信息</h2>
            <div class="summary-row"><span class="muted">产地</span><strong>${order.batch.origin}</strong></div>
            <div class="summary-row"><span class="muted">采收/生产</span><strong>${order.batch.harvestAt}</strong></div>
            <div class="summary-row"><span class="muted">保质期</span><strong>${order.batch.shelfLife}</strong></div>
          </div>
          <div class="card panel">
            <h2>质检结果</h2>
            <div class="summary-row"><span class="muted">结论</span><strong>${order.qa.result}</strong></div>
            <div class="summary-row"><span class="muted">报告号</span><strong>${order.qa.reportNo}</strong></div>
            <div class="summary-row"><span class="muted">质检员</span><strong>${order.qa.inspector}</strong></div>
          </div>
        </div>
        <div class="section">
          <div class="section-head"><h2>履约时间线</h2></div>
          <div class="card panel timeline">
            ${order.timeline.map((item) => `
              <div class="timeline-row">
                <span class="timeline-dot ${item.done ? "done" : ""}"></span>
                <div><div class="split"><strong>${item.title}</strong><span class="muted small">${item.time}</span></div><div class="muted small">${item.desc}</div></div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
      document.getElementById("modal").classList.add("open");
    }

    function setView(view) {
      document.querySelectorAll(".view").forEach((node) => node.classList.toggle("active", node.id === view));
      document.querySelectorAll(".nav-button").forEach((node) => node.classList.toggle("active", node.dataset.view === view));
      const titleMap = { dashboard: "今日项目看板", catalog: "生鲜商品目录", orders: "采购订单跟踪", supplier: "供应商工作台" };
      document.getElementById("pageTitle").textContent = titleMap[view];
    }

    document.addEventListener("click", (event) => {
      const nav = event.target.closest("[data-view]");
      const link = event.target.closest("[data-view-link]");
      const order = event.target.closest("[data-open-order]");
      const category = event.target.closest("[data-category]");
      const orderFilter = event.target.closest("[data-order-filter]");
      const role = event.target.closest("[data-role]");
      if (nav) setView(nav.dataset.view);
      if (link) setView(link.dataset.viewLink);
      if (order) openOrder(order.dataset.openOrder);
      if (category) renderCatalog(category.dataset.category);
      if (orderFilter) renderOrders(orderFilter.dataset.orderFilter);
      if (role) {
        document.querySelectorAll(".role-button").forEach((node) => node.classList.toggle("active", node === role));
        document.getElementById("roleText").textContent = role.dataset.role;
      }
      if (event.target.id === "modal") document.getElementById("modal").classList.remove("open");
    });

    document.getElementById("closeModal").addEventListener("click", () => {
      document.getElementById("modal").classList.remove("open");
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") document.getElementById("modal").classList.remove("open");
    });

    renderDashboard();
    renderCatalog();
    renderOrders("all");
    renderSupplier();
  </script>
</body>
</html>
